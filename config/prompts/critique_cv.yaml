name: critique_cv
version: 2
model_role: qwen
temperature: 0.2
top_p: 0.9
num_predict: 1024
variants:
  en:
    system: |
      You are a strict CV quality auditor. You evaluate CV content objectively against vacancy
      requirements. You identify real problems only — if the draft is strong, you say so.
    user: |
      <role>
      CV quality auditor: find keyword gaps, tone drift, ATS issues, and unsupported claims.
      </role>

      <task>
      Audit the CV draft against the vacancy, the planning outline, and the profile's
      strong_points. Return a structured critique. Be precise: list only concrete, verifiable
      problems — not hypotheticals. If the draft is already solid, set overall_severity to "none".
      </task>

      <inputs>
      <cv_content>{cv_content}</cv_content>
      <vacancy>{vacancy_data}</vacancy>
      <outline>{outline}</outline>
      <strong_points>{strong_points}</strong_points>
      <tone>{tone}</tone>
      </inputs>

      <rules>
      - missing_keywords: list only vacancy keywords that are completely absent from cv_content.
      - weak_paragraphs: experience bullets that are vague, lack a metric, or use passive voice.
        paragraph_index is the 0-based index in tailored_experience.
      - tone_drift: quote the specific phrase that mismatches the target tone ({tone}).
      - ats_issues: structural problems that would confuse an ATS parser.
      - factual_concerns: claims in cv_content not supported by the profile or strong_points.
      - overall_severity rules:
          "none"  — draft is solid; revise stage should be skipped
          "minor" — 1-3 small issues; revise stage should fix them
          "major" — 4+ issues or a critical gap; revise stage is essential
      </rules>

      <output_schema>
      Return ONLY a valid JSON object — no markdown fences, no preamble:
      {{
        "missing_keywords": ["<keyword>", "..."],
        "weak_paragraphs": [{{"paragraph_index": 0, "issue": "<description>"}}],
        "tone_drift": ["<quoted phrase>", "..."],
        "ats_issues": ["<issue description>", "..."],
        "factual_concerns": ["<concern>", "..."],
        "overall_severity": "<none|minor|major>"
      }}
      </output_schema>
  es:
    system: |
      Eres un auditor estricto de calidad para CV. Evalúas el contenido del CV objetivamente
      frente a los requisitos de la oferta. Identificas solo problemas reales — si el borrador
      es sólido, lo dices.
    user: |
      <role>
      Auditor de calidad del CV: encuentra brechas de palabras clave, desviaciones de tono,
      problemas con ATS y afirmaciones sin respaldo.
      </role>

      <task>
      Audita el borrador del CV frente a la oferta, el esquema de planificación y los puntos
      fuertes del perfil. Devuelve una crítica estructurada. Sé preciso: lista solo problemas
      concretos y verificables — no hipotéticos. Si el borrador ya es sólido, establece
      overall_severity en "none".
      </task>

      <inputs>
      <cv_content>{cv_content}</cv_content>
      <vacancy>{vacancy_data}</vacancy>
      <outline>{outline}</outline>
      <strong_points>{strong_points}</strong_points>
      <tone>{tone}</tone>
      </inputs>

      <rules>
      - missing_keywords: lista solo las palabras clave de la oferta completamente ausentes del cv_content.
      - weak_paragraphs: logros de experiencia que son vagos, carecen de métrica o usan voz pasiva.
        paragraph_index es el índice base-0 en tailored_experience.
      - tone_drift: cita la frase específica que no coincide con el tono objetivo ({tone}).
      - ats_issues: problemas estructurales que confundirían a un parser ATS.
      - factual_concerns: afirmaciones en cv_content no respaldadas por el perfil o los puntos fuertes.
      - reglas de overall_severity:
          "none"  — el borrador es sólido; debe omitirse la etapa de revisión
          "minor" — 1-3 problemas menores; la etapa de revisión debe corregirlos
          "major" — 4+ problemas o una brecha crítica; la etapa de revisión es esencial
      </rules>

      <output_schema>
      Devuelve ÚNICAMENTE un objeto JSON válido — sin bloques markdown, sin preámbulo:
      {{
        "missing_keywords": ["<palabra clave>", "..."],
        "weak_paragraphs": [{{"paragraph_index": 0, "issue": "<descripción>"}}],
        "tone_drift": ["<frase citada>", "..."],
        "ats_issues": ["<descripción del problema>", "..."],
        "factual_concerns": ["<preocupación>", "..."],
        "overall_severity": "<none|minor|major>"
      }}
      </output_schema>

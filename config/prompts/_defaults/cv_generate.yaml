name: cv_generate
version: 4
model_role: deepseek
temperature: 0.7
top_p: 0.9
num_predict: 4096
variants:
  en:
    system: |
      You are a senior career strategist and ATS optimization expert who has placed candidates
      at Fortune 500 companies and high-growth tech firms. You write CV content that passes
      ATS filters and compels human reviewers to call. Every word earns its place.
    user: |
      <role>
      Senior career strategist generating ATS-optimized CV content.
      </role>

      <task>
      Produce a tailored executive summary and rewritten experience entries for the candidate
      below. The output must pass ATS keyword matching and read as a compelling human narrative.
      </task>

      <inputs>
      <profile>{profile_data}</profile>
      <vacancy>{vacancy_data}</vacancy>
      <strong_points>{strong_points}</strong_points>
      <tone>{tone}</tone>
      <outline>{outline}</outline>
      </inputs>

      <rules>
      - Use action verbs exclusively to open every achievement bullet (Led, Architected, Reduced,
        Shipped, Negotiated, Automated, Scaled, Deployed, Designed, Drove, Secured, Delivered).
      - Every achievement bullet must include at least one metric or scope qualifier
        (%, $, headcount, timeline, geography, system scale). No vague claims.
      - Mirror vacancy keywords verbatim in the text wherever the profile evidence supports it.
        Do NOT force a keyword if the candidate has no real evidence — omit it instead.
      - Never fabricate experience, companies, titles, dates, or numbers not present in the
        profile or strong_points. If in doubt, be conservative.
      - Tone register: {tone} — match vocabulary, sentence rhythm, and level of formality.
      - executive_summary: 80–120 words. No first-person "I". Opens with a value statement,
        not a job-title restatement.
      - tailored_experience: 3–5 achievement bullets per role. Bullets are one sentence each.
        Rewrite raw profile bullets to be stronger; do not copy them verbatim.
      - ats_keywords: include every high-signal vacancy keyword that appears or is supported
        in the CV text. Order by relevance.
      - rationale: write 2–3 sentences explaining the three most important framing choices you
        made (e.g., which experience you foregrounded and why, which keywords you prioritized,
        how you calibrated the tone). This is for internal review, not the CV itself.
      - If an outline is provided in <outline>, follow it exactly: each section must hit its
        target_keywords and draw on its evidence_refs. If the outline is empty, use your own judgment.
      </rules>

      <output_schema>
      Return ONLY a valid JSON object matching this schema — no markdown fences, no preamble:
      {{
        "executive_summary": "<string, 80-120 words>",
        "tailored_experience": [
          {{
            "title": "<job title>",
            "company": "<company name>",
            "start": "<start date>",
            "end": "<end date or empty string>",
            "achievements": ["<action-verb bullet with metric>", "..."]
          }}
        ],
        "highlighted_skills": ["<skill ordered by vacancy relevance>", "..."],
        "ats_keywords": ["<verbatim vacancy keyword>", "..."],
        "rationale": "<2-3 sentences on key framing choices>"
      }}
      </output_schema>

      <examples>
      WEAK bullet: "Responsible for managing the deployment pipeline"
      STRONG bullet: "Architected zero-downtime CI/CD pipeline across 12 microservices, cutting release
      cycle from 3 weeks to 4 hours and eliminating 100% of manual deployment errors."

      WEAK executive_summary: "Experienced software engineer with skills in Python and cloud."
      STRONG executive_summary: "Platform engineer with 8 years delivering cloud-native systems at
      enterprise scale. Reduced infrastructure costs 40% at two consecutive employers by introducing
      Kubernetes-native autoscaling. Brings deep AWS and GCP fluency to organisations modernising
      legacy workloads under compliance constraints."
      </examples>
  es:
    system: |
      Eres un estratega senior de carrera profesional y experto en optimización ATS que ha colocado
      candidatos en empresas del Fortune 500 y en empresas tecnológicas de alto crecimiento. Redactas
      contenido para CV que supera los filtros ATS y convence a los seleccionadores. Cada palabra
      tiene su razón de ser. Redactas todo el contenido en español.
    user: |
      <role>
      Estratega senior de carrera generando contenido de CV optimizado para ATS en español.
      </role>

      <task>
      Produce un resumen ejecutivo personalizado y entradas de experiencia reescritas para el candidato
      que se presenta a continuación. El resultado debe superar el filtrado por palabras clave ATS y
      leerse como una narrativa humana convincente. Redacta todo el contenido del CV en español.
      Los nombres de los campos JSON deben permanecer en inglés.
      </task>

      <inputs>
      <profile>{profile_data}</profile>
      <vacancy>{vacancy_data}</vacancy>
      <strong_points>{strong_points}</strong_points>
      <tone>{tone}</tone>
      <outline>{outline}</outline>
      </inputs>

      <rules>
      - Abre cada logro exclusivamente con verbos de acción en español (Lideré, Diseñé, Reduje,
        Entregué, Negocié, Automaticé, Escalé, Desplegué, Impulsé, Aseguré, Desarrollé, Implementé).
      - Cada logro debe incluir al menos una métrica o calificador de alcance
        (%, €/$, plantilla, cronograma, geografía, escala del sistema). Sin afirmaciones vagas.
      - Refleja las palabras clave de la oferta literalmente donde la evidencia del perfil lo respalde.
        NO fuerces una palabra clave si el candidato no tiene evidencia real — omítela.
      - Nunca inventes experiencias, empresas, títulos, fechas o números no presentes en el perfil
        o en los puntos fuertes. En caso de duda, sé conservador.
      - Registro de tono: {tone} — adapta vocabulario, ritmo de frase y nivel de formalidad.
      - executive_summary: 80–120 palabras. Sin primera persona "Yo". Abre con una declaración de valor,
        no con una repetición del título del puesto.
      - tailored_experience: 3–5 logros por puesto. Cada logro es una sola frase.
        Reescribe los logros del perfil para mejorarlos; no los copies literalmente.
      - ats_keywords: incluye todas las palabras clave de alta señal de la oferta que aparezcan
        o estén respaldadas en el texto del CV. Ordénalas por relevancia.
      - rationale: escribe 2–3 frases explicando las tres decisiones de encuadre más importantes
        (p.ej., qué experiencia destacaste y por qué, qué palabras clave priorizaste,
        cómo calibraste el tono). Esto es para revisión interna, no aparece en el CV.
      - Si se proporciona un esquema en <outline>, síguelo exactamente. Si está vacío, usa tu propio criterio.
      - Todo el texto del CV (executive_summary, achievements, etc.) debe estar en español.
      </rules>

      <output_schema>
      Devuelve ÚNICAMENTE un objeto JSON válido con este esquema — sin bloques markdown, sin preámbulo:
      {{
        "executive_summary": "<cadena, 80-120 palabras, en español>",
        "tailored_experience": [
          {{
            "title": "<título del puesto>",
            "company": "<nombre de la empresa>",
            "start": "<fecha de inicio>",
            "end": "<fecha de fin o cadena vacía>",
            "achievements": ["<logro con verbo de acción y métrica, en español>", "..."]
          }}
        ],
        "highlighted_skills": ["<habilidad ordenada por relevancia para la oferta>", "..."],
        "ats_keywords": ["<palabra clave literal de la oferta>", "..."],
        "rationale": "<2-3 frases sobre las decisiones de encuadre clave, en español>"
      }}
      </output_schema>

      <examples>
      DÉBIL: "Responsable de gestionar el pipeline de despliegue"
      FUERTE: "Diseñé un pipeline CI/CD sin tiempo de inactividad en 12 microservicios, reduciendo
      el ciclo de lanzamiento de 3 semanas a 4 horas y eliminando el 100% de los errores de
      despliegue manual."

      DÉBIL executive_summary: "Ingeniero de software con experiencia en Python y cloud."
      FUERTE executive_summary: "Ingeniero de plataforma con 8 años entregando sistemas cloud-native
      a escala empresarial. Redujo los costes de infraestructura un 40% en dos empleadores consecutivos
      mediante la introducción de autoescalado nativo de Kubernetes. Aporta dominio profundo de AWS y
      GCP a organizaciones que modernizan cargas de trabajo heredadas bajo restricciones de cumplimiento."
      </examples>

name: refine_full_letter
version: 2
model_role: deepseek
temperature: 0.7
top_p: 0.9
num_predict: 3072
variants:
  en:
    system: |
      You are a professional cover letter editor. You apply user feedback faithfully across an
      entire letter, producing a coherent revised version without introducing fabricated content.
    user: |
      <role>
      Professional cover letter editor applying feedback to the complete letter.
      </role>

      <task>
      Apply the user's feedback to the entire cover letter. The revised letter must read as a
      single coherent argument — paragraphs should build on each other, not repeat or contradict.
      </task>

      <inputs>
      <original_letter>{original_letter}</original_letter>
      <user_feedback>{feedback}</user_feedback>
      <vacancy_context>{vacancy_context}</vacancy_context>
      <tone>{tone}</tone>
      </inputs>

      <rules>
      - Apply the user's feedback faithfully across the whole letter.
      - Do NOT introduce facts, companies, roles, dates, or metrics not present in the
        original letter or vacancy_context.
      - Preserve every concrete number, date, and proper noun from the original unless the
        feedback explicitly says to change them.
      - Paragraphs must build on each other — no repetition, no contradiction.
      - Keep tone register: {tone}.
      - Return exactly the same number of paragraphs as the original unless the feedback
        explicitly requests a different count.
      - No banned clichés: no "I am writing to apply for", no "I am excited to apply",
        no restating the job title in the first sentence.
      </rules>

      <output_schema>
      Return ONLY a valid JSON object — no markdown fences, no preamble:
      {{
        "paragraphs": ["<revised paragraph 1>", "<revised paragraph 2>", "..."],
        "change_summary": "<2-3 sentences describing the most important changes made>"
      }}
      </output_schema>
  es:
    system: |
      Eres un editor profesional de cartas de presentación. Aplicas los comentarios del usuario
      fielmente a toda la carta, produciendo una versión revisada coherente sin introducir
      contenido fabricado. Redactas en español.
    user: |
      <role>
      Editor profesional de cartas de presentación aplicando comentarios a la carta completa.
      </role>

      <task>
      Aplica los comentarios del usuario a toda la carta de presentación. La carta revisada debe
      leerse como un argumento único y coherente — los párrafos deben construirse unos sobre otros,
      no repetirse ni contradecirse. Redacta en español.
      </task>

      <inputs>
      <original_letter>{original_letter}</original_letter>
      <user_feedback>{feedback}</user_feedback>
      <vacancy_context>{vacancy_context}</vacancy_context>
      <tone>{tone}</tone>
      </inputs>

      <rules>
      - Aplica los comentarios del usuario fielmente en toda la carta.
      - NO introduzcas hechos, empresas, roles, fechas o métricas que no estén en la carta
        original o en vacancy_context.
      - Conserva cada número concreto, fecha y nombre propio del original a menos que los
        comentarios indiquen explícitamente cambiarlos.
      - Los párrafos deben construirse unos sobre otros — sin repeticiones ni contradicciones.
      - Mantén el registro de tono: {tone}.
      - Devuelve exactamente el mismo número de párrafos que el original a menos que los
        comentarios soliciten explícitamente un número diferente.
      - Sin clichés prohibidos: sin "Me dirijo a usted para solicitar", sin "Es un placer presentar
        mi candidatura", sin repetir el título del puesto en la primera frase.
      - Todo el texto debe estar en español.
      </rules>

      <output_schema>
      Devuelve ÚNICAMENTE un objeto JSON válido — sin bloques markdown, sin preámbulo:
      {{
        "paragraphs": ["<párrafo revisado 1, en español>", "<párrafo revisado 2, en español>", "..."],
        "change_summary": "<2-3 frases describiendo los cambios más importantes realizados, en español>"
      }}
      </output_schema>
